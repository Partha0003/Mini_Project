<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<div th:fragment="sidebar">
    <div class="bg-dark text-white p-3" style="width:250px; min-height:100vh;">
        <div class="mb-3 pb-2 border-bottom border-secondary">
            <small class="text-muted">Logged in as:</small><br/>
            <span class="fw-semibold" sec:authentication="name">user</span>
            <span class="badge bg-secondary ms-1" sec:authentication="principal.authorities">ROLE_USER</span>
        </div>
        <ul class="nav flex-column">

            <li class="nav-item">
                <a class="nav-link text-white" th:href="@{/dashboard}">
                    Transaction Details
                </a>
            </li>

            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link text-info" th:href="@{/admin/dashboard}">
                    Admin Dashboard
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-danger" th:href="@{/fraud-report}">
                    Fraud Report
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-warning" th:href="@{/suspicious-report}">
                    Suspicious Report
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-success" th:href="@{/normal-report}">
                    Normal Report
                </a>
            </li>

            <li class="nav-item mt-3">
                <form th:action="@{/logout}" method="post" class="m-0 p-0">
                    <button type="submit" class="nav-link text-white btn btn-link p-0 text-start">
                        Logout
                    </button>
                </form>
            </li>

        </ul>
    </div>
</div>

</body>
</html>
