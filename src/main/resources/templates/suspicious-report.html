<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Suspicious Transactions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="d-flex">
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="flex-fill p-4">
<div class="page-card p-4">
<div class="page-header">
    <h2 class="text-warning mb-0">⚠ Suspicious Transactions</h2>
    <a th:href="@{/dashboard}" class="btn btn-secondary">⬅ Back to Dashboard</a>
</div>

<div class="mb-2 text-end">
    <span class="badge bg-secondary">
        Page <span th:text="${currentPage + 1}">1</span> /
        <span th:text="${totalPages == 0 ? 1 : totalPages}">1</span>
    </span>
</div>

<div class="table-responsive" style="max-height: 520px;">
<table class="table table-bordered table-dark mb-0">
    <thead class="table-warning sticky-top">
    <tr>
        <th>ID</th>
        <th>Account</th>
        <th>
            <a class="text-dark text-decoration-none"
               th:href="@{/suspicious-report(page=${currentPage},size=${pageSize},sortBy='amount',dir=${sortBy == 'amount' and dir == 'asc' ? 'desc' : 'asc'})}">
                Amount
            </a>
        </th>
        <th>Location</th>
        <th>Status</th>
        <th>
            <a class="text-dark text-decoration-none"
               th:href="@{/suspicious-report(page=${currentPage},size=${pageSize},sortBy='riskScore',dir=${sortBy == 'riskScore' and dir == 'asc' ? 'desc' : 'asc'})}">
                Risk
            </a>
        </th>
        <th>Reason</th>
        <th>Rules</th>
        <th>
            <a class="text-dark text-decoration-none"
               th:href="@{/suspicious-report(page=${currentPage},size=${pageSize},sortBy='transactionTime',dir=${sortBy == 'transactionTime' and dir == 'asc' ? 'desc' : 'asc'})}">
                Time
            </a>
        </th>
    </tr>
    </thead>

    <tbody>
    <tr th:if="${#lists.isEmpty(transactions)}">
        <td colspan="9" class="text-center">No suspicious transactions found.</td>
    </tr>
    <tr th:each="txn : ${transactions}">
        <td th:text="${txn.id}"></td>
        <td th:text="${txn.accountNumber}"></td>
        <td>₹ <span th:text="${txn.amount}"></span></td>
        <td th:text="${txn.location}"></td>
        <td>
            <span class="badge bg-warning text-dark"
                  th:text="${txn.status}"></span>
        </td>
        <td th:text="${txn.riskScore}"></td>
        <td th:utext="${#strings.replace(txn.fraudReason, '\n', '<br/>')}"></td>
        <td>
            <span class="badge bg-info text-dark"
                  th:text="${ruleCountMap[txn.id] != null ? ruleCountMap[txn.id] + ' rules' : '0 rules'}">
            </span>
        </td>
        <td th:text="${txn.transactionTime != null ? #temporals.format(txn.transactionTime, 'dd-MM-yyyy HH:mm') : 'NA'}"></td>
    </tr>
    </tbody>
</table>
</div>
<div class="d-flex justify-content-between mt-3">
    <a class="btn btn-outline-light"
       th:classappend="${!hasPrevious} ? ' disabled'"
       th:href="@{/suspicious-report(page=${currentPage - 1},size=${pageSize},sortBy=${sortBy},dir=${dir})}">
        Previous
    </a>
    <a class="btn btn-outline-light"
       th:classappend="${!hasNext} ? ' disabled'"
       th:href="@{/suspicious-report(page=${currentPage + 1},size=${pageSize},sortBy=${sortBy},dir=${dir})}">
        Next
    </a>
</div>
<div class="container mt-3" sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/download-suspicious-report}" class="btn btn-warning text-dark">
        Download Suspicious Report (Excel)
    </a>
</div>
</div>
</div>
</div>

</body>
</html>
