<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Access Denied</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="container mt-5">

<div class="page-card p-5 text-center">
    <h1 class="text-danger mb-3">403 - Access Denied</h1>
    <p class="lead">You do not have permission to access this page.</p>
    <p class="text-muted">If you need this access, please contact an administrator.</p>
    <div class="mt-4">
        <a th:href="@{/dashboard}" class="btn btn-primary me-2">Go to Dashboard</a>
        <a th:href="@{/login}" class="btn btn-outline-light">Login as Different User</a>
    </div>
</div>

</body>
</html>
