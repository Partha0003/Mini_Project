<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Fraud Detection Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="flex-fill p-4 text-white">

        <h2 class="mb-4">Fraud Detection Dashboard</h2>

        <!-- SUMMARY CARDS -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card p-3 text-center shadow border-primary bg-dark text-white">
                    <h5>Total Transactions</h5>
                    <h3 th:text="${totalTransactions}">0</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 text-center shadow border-danger bg-dark text-white">
                    <h5>Fraud Detected</h5>
                    <h3 class="text-danger" th:text="${fraudCount}">0</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 text-center shadow border-success bg-dark text-white">
                    <h5>Safe Transactions</h5>
                    <h3 class="text-success" th:text="${safeCount}">0</h3>
                </div>
            </div>
        </div>

        <!-- ADD FORM -->
        <div class="card p-4 shadow mb-4 bg-dark text-white">
            <h4>Add New Transaction</h4>

            <form th:action="@{/transaction/create}" method="post" class="row g-3">

                <div class="col-md-3">
                    <label class="form-label">Account Number</label>
                    <input type="number"
                           name="accountNumber"
                           class="form-control"
                           placeholder="1234567890"
                           required>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Amount</label>
                    <input type="number"
                           step="0.01"
                           name="amount"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Location</label>
                    <input type="text"
                           name="location"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit"
                            class="btn btn-primary w-100">
                        Add
                    </button>
                </div>

            </form>
        </div>

        <!-- TABLE -->
        <div class="card p-4 shadow bg-dark text-white">
            <div class="d-flex justify-content-between align-items-center">
                <h4 class="mb-0">All Transactions</h4>
                <span class="badge bg-secondary">
                    Page <span th:text="${currentPage + 1}">1</span> /
                    <span th:text="${totalPages == 0 ? 1 : totalPages}">1</span>
                    | Total: <span th:text="${totalTransactions}">0</span>
                </span>
            </div>

            <div class="table-responsive mt-3" style="max-height: 520px;">
            <table class="table table-bordered table-hover table-dark mb-0">

                <thead class="sticky-top">
                <tr>
                    <th>ID</th>
                    <th>
                        <a class="text-white text-decoration-none"
                           th:href="@{/dashboard(page=${currentPage},size=${pageSize},sortBy='accountNumber',dir=${sortBy == 'accountNumber' and dir == 'asc' ? 'desc' : 'asc'})}">
                            Account
                        </a>
                    </th>
                    <th>
                        <a class="text-white text-decoration-none"
                           th:href="@{/dashboard(page=${currentPage},size=${pageSize},sortBy='amount',dir=${sortBy == 'amount' and dir == 'asc' ? 'desc' : 'asc'})}">
                            Amount
                        </a>
                    </th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>
                        <a class="text-white text-decoration-none"
                           th:href="@{/dashboard(page=${currentPage},size=${pageSize},sortBy='riskScore',dir=${sortBy == 'riskScore' and dir == 'asc' ? 'desc' : 'asc'})}">
                            Risk
                        </a>
                    </th>
                    <th>Reason</th>
                    <th>Rules</th>
                    <th>
                        <a class="text-white text-decoration-none"
                           th:href="@{/dashboard(page=${currentPage},size=${pageSize},sortBy='transactionTime',dir=${sortBy == 'transactionTime' and dir == 'asc' ? 'desc' : 'asc'})}">
                            Time
                        </a>
                    </th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="txn : ${transactions}"
                    th:classappend="${txn.status == 'FRAUD' ? 'table-danger' :
                                     (txn.status == 'SUSPICIOUS' ? 'table-warning' : 'table-success')}">

                    <td th:text="${txn.id}"></td>
                    <td th:text="${txn.accountNumber}"></td>
                    <td th:text="${txn.amount}"></td>
                    <td th:text="${txn.location}"></td>
                    <td th:text="${txn.status}"></td>
                    <td th:text="${txn.riskScore}"></td>
                    <td th:utext="${#strings.replace(txn.fraudReason, '\n', '<br/>')}"></td>
                    <td>
                        <span class="badge bg-info text-dark"
                              th:text="${ruleCountMap[txn.id] != null ? ruleCountMap[txn.id] + ' rules' : '0 rules'}">
                        </span>
                    </td>
                    <td th:text="${txn.transactionTime != null ? #temporals.format(txn.transactionTime, 'dd-MM-yyyy HH:mm') : 'NA'}"></td>

                    <td sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/transaction/delete/{id}(id=${txn.id})}"
                           class="btn btn-sm btn-danger">
                            Delete
                        </a>
                    </td>
                    <td sec:authorize="!hasRole('ADMIN')">-</td>

                </tr>

                </tbody>
            </table>
            </div>

            <div class="d-flex justify-content-between mt-3">
                <a class="btn btn-outline-light"
                   th:classappend="${!hasPrevious} ? ' disabled'"
                   th:href="@{/dashboard(page=${currentPage - 1},size=${pageSize},sortBy=${sortBy},dir=${dir})}">
                    Previous
                </a>
                <a class="btn btn-outline-light"
                   th:classappend="${!hasNext} ? ' disabled'"
                   th:href="@{/dashboard(page=${currentPage + 1},size=${pageSize},sortBy=${sortBy},dir=${dir})}">
                    Next
                </a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
