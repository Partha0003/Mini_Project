<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Fraud Transactions Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        .fraud-row {
            background-color: #f8d7da !important;
        }
    </style>
</head>

<body>
<div class="d-flex">
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="flex-fill p-4">
<div class="page-card p-4">
<div class="page-header">
    <h2 class="mb-0 text-danger">🚨 Fraud Transactions Report</h2>
    <a href="/dashboard" class="btn btn-secondary">
        ⬅ Back to Dashboard
    </a>
</div>

<div class="mb-2 text-end">
    <span class="badge bg-secondary">
        Page <span th:text="${currentPage + 1}">1</span> /
        <span th:text="${totalPages == 0 ? 1 : totalPages}">1</span>
    </span>
</div>

<div class="table-responsive" style="max-height: 520px;">
<table class="table table-bordered table-hover table-dark mb-0">

    <thead class="table-dark sticky-top">
    <tr>
        <th>ID</th>
        <th>Account</th>
        <th>
            <a class="text-white text-decoration-none"
               th:href="@{/fraud-report(page=${currentPage},size=${pageSize},sortBy='amount',dir=${sortBy == 'amount' and dir == 'asc' ? 'desc' : 'asc'})}">
                Amount
            </a>
        </th>
        <th>Location</th>
        <th>Status</th>
        <th>
            <a class="text-white text-decoration-none"
               th:href="@{/fraud-report(page=${currentPage},size=${pageSize},sortBy='riskScore',dir=${sortBy == 'riskScore' and dir == 'asc' ? 'desc' : 'asc'})}">
                Risk Score
            </a>
        </th>
        <th>Reason</th>
        <th>Rules</th>
        <th>
            <a class="text-white text-decoration-none"
               th:href="@{/fraud-report(page=${currentPage},size=${pageSize},sortBy='transactionTime',dir=${sortBy == 'transactionTime' and dir == 'asc' ? 'desc' : 'asc'})}">
                Time
            </a>
        </th>
    </tr>
    </thead>

    <tbody>
    <tr th:if="${#lists.isEmpty(transactions)}">
        <td colspan="9" class="text-center">No fraud transactions found.</td>
    </tr>
    <tr th:each="tx : ${transactions}" class="fraud-row">
        <td th:text="${tx.id}"></td>
        <td th:text="${tx.accountNumber}"></td>
        <td>₹ <span th:text="${tx.amount}"></span></td>
        <td th:text="${tx.location}"></td>

        <td>
            <span class="badge bg-danger"
                  th:text="${tx.status}">
            </span>
        </td>

        <td th:text="${tx.riskScore}"></td>
        <td th:utext="${#strings.replace(tx.fraudReason, '\n', '<br/>')}"></td>
        <td>
            <span class="badge bg-info text-dark"
                  th:text="${ruleCountMap[tx.id] != null ? ruleCountMap[tx.id] + ' rules' : '0 rules'}">
            </span>
        </td>

        <td th:text="${tx.transactionTime != null ? #temporals.format(tx.transactionTime, 'dd-MM-yyyy HH:mm') : 'NA'}"></td>
    </tr>
    </tbody>
</table>
</div>
<div class="container mt-3" sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/download-fraud-report}" class="btn btn-danger">
        Download Fraud Report (Excel)
    </a>
</div>
<div class="d-flex justify-content-between mt-3">
    <a class="btn btn-outline-light"
       th:classappend="${!hasPrevious} ? ' disabled'"
       th:href="@{/fraud-report(page=${currentPage - 1},size=${pageSize},sortBy=${sortBy},dir=${dir})}">
        Previous
    </a>
    <a class="btn btn-outline-light"
       th:classappend="${!hasNext} ? ' disabled'"
       th:href="@{/fraud-report(page=${currentPage + 1},size=${pageSize},sortBy=${sortBy},dir=${dir})}">
        Next
    </a>
</div>
</div>
</div>
</div>
</body>
</html>
