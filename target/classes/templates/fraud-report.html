<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Fraud Transactions Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        .fraud-row {
            background-color: #f8d7da !important;
        }
    </style>
</head>

<body class="container mt-4">
<div class="page-card p-4">
<div class="page-header">
    <h2 class="mb-0 text-danger">🚨 Fraud Transactions Report</h2>
    <a href="/dashboard" class="btn btn-secondary">
        ⬅ Back to Dashboard
    </a>
</div>

<table class="table table-bordered table-hover table-dark">

    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Account</th>
        <th>Amount</th>
        <th>Location</th>
        <th>Status</th>
        <th>Risk Score</th>
        <th>Reason</th>
        <th>Rules</th>
        <th>Time</th>
    </tr>
    </thead>

    <tbody>
    <tr th:if="${#lists.isEmpty(transactions)}">
        <td colspan="9" class="text-center">No fraud transactions found.</td>
    </tr>
    <tr th:each="tx : ${transactions}" class="fraud-row">
        <td th:text="${tx.id}"></td>
        <td th:text="${tx.accountNumber}"></td>
        <td>₹ <span th:text="${tx.amount}"></span></td>
        <td th:text="${tx.location}"></td>

        <td>
            <span class="badge bg-danger"
                  th:text="${tx.status}">
            </span>
        </td>

        <td th:text="${tx.riskScore}"></td>
        <td th:utext="${#strings.replace(tx.fraudReason, '\n', '<br/>')}"></td>
        <td>
            <span class="badge bg-info text-dark"
                  th:text="${ruleCountMap[tx.id] != null ? ruleCountMap[tx.id] + ' rules' : '0 rules'}">
            </span>
        </td>

        <td th:text="${tx.transactionTime != null ? #temporals.format(tx.transactionTime, 'dd-MM-yyyy HH:mm') : 'NA'}"></td>
    </tr>
    </tbody>
</table>
<div class="container mt-3" sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/download-fraud-report}" class="btn btn-danger">
        Download Fraud Report (Excel)
    </a>
</div>
</div>
</body>
</html>
